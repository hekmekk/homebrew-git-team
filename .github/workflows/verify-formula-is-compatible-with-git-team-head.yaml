name: verify-formula-is-compatible-with-git-team-head
run-name: Verify Formula is compatible with git-team HEAD

on:
  workflow_dispatch:

jobs:
  verify-formula:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    env:
      HOMEBREW_NO_ASK: true
    steps:
      - uses: Homebrew/actions/setup-homebrew@75ea84e0c056f44fbc237368be867593cd459107 # master
      - run: brew install bubblewrap
        if: runner.os == 'Linux'
      - run: brew tap hekmekk/git-team
      - run: brew trust hekmekk/git-team
      - run: brew install git-team --HEAD --verbose
      - run: brew audit git-team --strict
      - run: brew test git-team
      - run: git-team --version
